baseURL: "https://skinprotect.kr/"
languageCode: "ko"
title: "스킨프로텍트 — 피부 보호 건강 가이드"
theme: "PaperMod"

defaultContentLanguage: "ko"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: "스킨프로텍트"
  description: "자외선과 피부 건강의 관계를 전문적으로 다루는 건강 정보 블로그. 피부암 예방, 광노화, 자외선 차단 가이드를 제공합니다."
  keywords: ["피부 보호", "자외선 피부", "피부암 예방", "광노화", "UV 피부 영향", "피부 건강"]
  author: "스킨프로텍트"
  images: ["/images/og-default.jpg"]
  DateFormat: "2006년 1월 2일"

  defaultTheme: light
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  hidemeta: false
  hideSummary: false

  homeInfoParams:
    Title: "🛡️ 스킨프로텍트"
    Content: >
      자외선으로부터 피부를 지키는 건강 정보 가이드.
      피부과학 기반의 정확한 정보로 피부 보호의 모든 것을 알려드립니다.

  socialIcons:
    - name: rss
      url: "/index.xml"

  analytics:
    google:
      SiteVerificationTag: ""

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: search
      name: "🔍 검색"
      url: /search/
      weight: 1
    - identifier: categories
      name: "📂 카테고리"
      url: /categories/
      weight: 2
    - identifier: tags
      name: "🏷️ 태그"
      url: /tags/
      weight: 3

markup:
  goldmark:
    renderer:
      unsafe: true

sitemap:
  changeFreq: "weekly"
  filename: "sitemap.xml"
  priority: 0.5

taxonomies:
  category: categories
  tag: tags
